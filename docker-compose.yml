services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/jobboard
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secret
      APP_JWT_SECRET: your-256-bit-secret-key-change-in-production
      APP_UPLOAD_DIR: /uploads
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_started

  db:
    image: postgres:15
    platform: linux/amd64
    environment:
      POSTGRES_DB: jobboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  uploads:
